<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>
  <link rel="icon" type="image/svg+xml" href="https://skillmount.com/icons/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    .about-text p {
      margin-bottom: 20px;
    }

    .about-text p:last-child {
      margin-bottom: 0;
    }

    #aboutName.skeleton {
      width: 70%;
      height: 82px;
      border-radius: 8px;
    }

    #aboutHeadline.skeleton {
      width: 85%;
      height: 20px;
      border-radius: 4px;
    }
  </style>
</head>

<body style="background: #000 !important; margin: 0; padding: 0;">
  <div class="container"
    style="min-height: 100vh; padding: 0px !important; display: flex; flex-direction: column; background: #000 !important; box-shadow: none;">
    <!-- Header -->
    <div style="position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: 25px 25px;">
      <i class="fa-solid fa-arrow-left"
        style="font-size: 18px; cursor: pointer; color: var(--text-primary); margin-bottom: 25px; transition: opacity 0.3s;"
        onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1" onclick="goBack()"></i>
      <h2 style="font-size: 26px; font-weight: 500; margin: 0; color: var(--text-primary); letter-spacing: -0.5px;">
        About me</h2>
    </div>

    <!-- Main Image Section -->
    <div id="aboutImageContainer" class="skeleton" style="position: relative; width: 100%; height: 65vh; overflow: hidden; background-color: #000;">
      <img id="aboutImage" src="" alt="About Cover"
        style="width: 100%; height: 100%; object-fit: cover; object-position: center 85px; filter: grayscale(100%); display: none;"
        onload="this.style.display='block'; document.getElementById('aboutImageContainer').classList.remove('skeleton');"
        onerror="document.getElementById('aboutImageContainer').classList.remove('skeleton');" />

      <!-- Vignette overlay to fade all edges into the background -->
      <div
        style="position: absolute; top: 0; bottom: 0; left: 0; right: 0; pointer-events: none; box-shadow: inset 0 0 120px 60px #000, inset 0 150px 100px -50px #000, inset 0 -150px 100px -50px #000;">
      </div>

      <!-- Top gradient overlay to conceal hard top edge of the image -->
      <div
        style="position: absolute; top: 0; left: 0; right: 0; height: 180px; background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 85px, rgba(0,0,0,0) 100%); pointer-events: none;">
      </div>

      <!-- Gradient overlay to blend image into background smoothly -->
      <div
        style="position: absolute; bottom: 0; left: 0; right: 0; height: 180px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0) 100%); pointer-events: none;">
      </div>
    </div>

    <!-- Content Section -->
    <div style="padding: 0 25px 40px; position: relative; z-index: 5; margin-top: -40px;">
      <h1 id="aboutName" class="skeleton"
        style="font-size: 38px; font-weight: 700; line-height: 1.1; margin-bottom: 12px; letter-spacing: -1px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);">
      </h1>
      <p id="aboutHeadline" class="skeleton"
        style="font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px; line-height: 1.4;">
      </p>

      <div style="width: 100%; height: 1px; background-color: var(--border-color); margin-bottom: 25px;"></div>

      <div class="about-text" id="aboutDescription"
        style="font-size: 12px; color: var(--text-primary); line-height: 1.7; text-align: justify; font-weight: 400; opacity: 0.9;">
        <div class="skeleton" style="height: 12px; width: 100%; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 12px; width: 100%; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 12px; width: 90%; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 12px; width: 95%; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 12px; width: 85%; border-radius: 4px; margin-bottom: 25px;"></div>
        <div class="skeleton" style="height: 12px; width: 100%; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 12px; width: 90%; border-radius: 4px; margin-bottom: 12px;"></div>
        <div class="skeleton" style="height: 12px; width: 60%; border-radius: 4px;"></div>
      </div>
    </div>
  </div>

  <script>
    function getUsernameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get('username');
      if (explicit) return explicit;
      return null;
    }

    function goBack() {
      const username = getUsernameFromUrl();
      if (username) {
        window.location.href = `../index.html?username=${username}`;
      } else {
        window.location.href = '../index.html';
      }
    }

    async function renderAbout() {
      let users = [];
      try {
        const res = await fetch('../user/users.json', { cache: 'no-store' });
        users = await res.json();
      } catch (e) {
        console.error('Failed to load user/users.json', e);
      }

      const username = getUsernameFromUrl();
      const currentUser = (username ? users.find(u => u.username === username) : null) || users[0];

      if (currentUser) {
        // Set Image (from JSON)
        document.getElementById('aboutImage').src = currentUser.aboutImage || currentUser.coverUrl || '';

        // Set Name
        // In the design, name looks like it's broken into two lines, but setting it via JS will wrap naturally based on container width
        const nameEl = document.getElementById('aboutName');
        nameEl.innerHTML = currentUser.name.replace(' ', '<br>');
        nameEl.classList.remove('skeleton');

        // Set Headline
        const headlineEl = document.getElementById('aboutHeadline');
        headlineEl.innerHTML = currentUser.headline ? currentUser.headline.replace(/\s*\|\s*/g, '<br>') : '';
        headlineEl.classList.remove('skeleton');

        // Set About Text
        if (currentUser.about) {
          document.getElementById('aboutDescription').innerHTML = `<p>${currentUser.about.replace(/\n/g, '</p><p>')}</p>`;
        }
      }
    }

    // Init
    renderAbout();
  </script>
</body>

</html>
