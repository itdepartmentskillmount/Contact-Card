<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="icon" type="image/svg+xml" href="https://skillmount.com/icons/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../index.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
  <div class="container" style="min-height: 100vh; padding: 0px !important; display: flex; flex-direction: column; justify-content: center;">
    <!-- Gallery Section -->
    <div id="gallerySection" class="gallery-section" style="margin-top: 0; border-top: none; border-radius: 0;">
      <div style="display: flex; flex-direction: column; align-items: flex-start; padding: 20px 15px 15px;">
        <i class="fa-solid fa-arrow-left" style="font-size: 18px; cursor: pointer; color: var(--text-primary); margin-bottom: 20px;" onclick="goBack()"></i>
        <h2 style="font-size: 22px; font-weight: 400; margin: 0; color: var(--text-primary); text-align: left; width: 100%;">Gallery</h2>
      </div>
      <div id="galleryGrid" class="gallery-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Lightbox Element -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">&times;</button>
    <img id="lightboxImg" src="" alt="Lightbox Preview" onclick="event.stopPropagation()" />
  </div>

  <script>
    function getUsernameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get('username');
      if (explicit) return explicit;
      return null;
    }

    function redirectToNotFound(username) {
      const encoded = encodeURIComponent(username || '');
      window.location.href = `./not-found.html${encoded ? `?username=${encoded}` : ''}`;
    }

    function goBack() {
      const username = getUsernameFromUrl();
      if (username) {
        window.location.href = `../index.html?username=${username}`;
      } else {
        window.location.href = '../index.html';
      }
    }

    async function renderGallery() {
      const username = getUsernameFromUrl();
      if (!username) {
        redirectToNotFound(null);
        return;
      }

      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      
      for (let i = 0; i < 9; i++) {
        const skeleton = document.createElement('div');
        skeleton.className = 'skeleton-item skeleton';
        grid.appendChild(skeleton);
      }

      let users = [];
      try {
        const res = await fetch('../user/users.json', { cache: 'no-store' });
        users = await res.json();
      } catch (e) {
        console.error('Failed to load user/users.json', e);
      }

      const matchedUser = users.find(u => u.username === username);
      if (!matchedUser) {
        redirectToNotFound(username);
        return;
      }
      const currentUser = matchedUser;

      setTimeout(() => {
        grid.innerHTML = '';
        
        const userGallery = (currentUser && currentUser.gallery) ? currentUser.gallery : [];

        if (userGallery.length === 0) {
          grid.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-muted); margin-top:20px;">No images found.</p>';
          return;
        }

        userGallery.forEach((url, i) => {
          const item = document.createElement('div');
          item.className = 'gallery-item';
          
          const a = document.createElement('a');
          a.href = "#";
          a.onclick = (e) => {
            e.preventDefault();
            openLightbox(url);
          };

          const img = document.createElement('img');
          img.src = url;
          img.alt = `Instagram Item ${i + 1}`;
          a.appendChild(img);
          item.appendChild(a);

          if (i % 3 === 2) {
            const icon = document.createElement('div');
            icon.className = 'gallery-item-icon';
            icon.innerHTML = '<i class="fa-solid fa-play"></i>';
            item.appendChild(icon);
          } else if (i % 4 === 3) {
            const icon = document.createElement('div');
            icon.className = 'gallery-item-icon';
            icon.innerHTML = '<i class="fa-solid fa-clone"></i>';
            item.appendChild(icon);
          }
          
          grid.appendChild(item);
        });
      }, 1000);
    }

    // Lightbox Logic
    function openLightbox(url) {
      const lightbox = document.getElementById('lightbox');
      document.getElementById('lightboxImg').src = url;
      lightbox.classList.add('active');
    }

    function closeLightbox() {
      const lightbox = document.getElementById('lightbox');
      lightbox.classList.remove('active');
    }

    // Init
    renderGallery();
  </script>
</body>
</html>
