<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Card</title>
  <link rel="icon" type="image/svg+xml" href="https://skillmount.com/icons/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
  <div class="container">
    <!-- Top Navigation -->
    <nav class="top-nav">
      <button class="nav-btn" onclick="openAboutPage()">
        <i class="fa-solid fa-circle-info"></i>
        About Me
      </button>
      <button class="nav-btn" onclick="openGalleryPage()">
        <i class="fa-solid fa-image"></i>
        Gallery
      </button>
    </nav>

    <!-- White Header Notch -->
    <div class="header-notch"></div>

    <!-- Profile Section -->
    <section class="profile-section">
      <div id="cardAvatarContainer" class="profile-img-container skeleton">
        <img id="cardAvatar" src="" alt="Profile Picture" style="display: none;" onload="this.style.display='block'; document.getElementById('cardAvatarContainer').classList.remove('skeleton');" />
      </div>
      <h1 id="cardName" class="profile-name skeleton" style="min-width: 200px; height: 26px; margin: 15px auto 0; border-radius: 6px;"></h1>
      <p id="cardHeadline" class="profile-headline skeleton" style="min-width: 250px; height: 16px; margin: 5px auto 0; border-radius: 4px;"></p>
    </section>

    <!-- Main Action Block -->
    <div class="action-block">
      <div class="action-row">
        <div class="action-icon active" title="Call"><i class="fa-solid fa-phone-volume"></i></div>
        <div class="action-icon" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></div>
        <div class="action-icon" title="Email"><i class="fa-regular fa-envelope"></i></div>
        <div class="action-icon" title="Save Contact"><i class="fa-solid fa-cloud-arrow-down"></i></div>
      </div>
      <div class="action-divider"></div>
      <div class="action-footer" id="actionFooterContainer" style="display: flex; flex-direction: column; gap: 15px; align-items: stretch; justify-content: center; width: 100%;">
        <!-- Dynamically rendered -->
      </div>
    </div>

    <!-- Top Social Pills -->
    <div id="topSocialPills" class="social-pills">
      <!-- Will be populated by JS -->
    </div>

    <div class="brand-contact-container">
      <!-- Brand Tabs -->
      <div id="brandTabs" class="brand-tabs">
        <!-- Will be populated by JS -->
      </div>

      <!-- Contact List -->
      <div id="contactList" class="contact-list">
        <!-- Will be populated by JS based on selected brand -->
      </div>
    </div>



  </div>

  <script>
    let currentUser = null;
    let currentBrand = null;
    let currentAction = 'call'; // 'call', 'whatsapp', 'email', 'save'

    function getUsernameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const explicit = params.get('username');
      if (explicit) return explicit;
      const raw = window.location.search.replace(/^\?/, '').trim();
      if (!raw) return null;
      try { return decodeURIComponent(raw); } catch { return raw; }
    }

    function redirectToNotFound(username) {
      const encoded = encodeURIComponent(username || '');
      window.location.href = `./pages/not-found.html${encoded ? `?username=${encoded}` : ''}`;
    }

    function normalizeE164(phone) {
      if (!phone) return '';
      const s = String(phone).trim();
      const hasPlus = s.startsWith('+');
      const digits = s.replace(/[^0-9]/g, '');
      return (hasPlus ? '+' : '') + digits;
    }

    async function init() {
      const username = getUsernameFromUrl();
      if (!username) {
        redirectToNotFound(null);
        return;
      }

      let users = [];
      try {
        const res = await fetch('./user/users.json', { cache: 'no-store' });
        users = await res.json();
      } catch (e) { console.error('Failed to load user/users.json', e); return; }

      const matchedUser = users.find(u => u.username === username);
      if (!matchedUser) {
        redirectToNotFound(username);
        return;
      }

      currentUser = matchedUser;
      if (currentUser && currentUser.brands && currentUser.brands.length > 0) {
        currentBrand = currentUser.brands[0];
      } else {
        currentBrand = null;
      }
      renderUser();
    }

    function renderUser() {
      if (!currentUser) return;
      document.getElementById('cardAvatar').src = currentUser.avatarUrl;
      
      const nameEl = document.getElementById('cardName');
      nameEl.textContent = currentUser.name;
      nameEl.classList.remove('skeleton');
      nameEl.style.minWidth = 'auto';
      nameEl.style.height = 'auto';

      const headlineEl = document.getElementById('cardHeadline');
      headlineEl.innerHTML = currentUser.headline ? currentUser.headline.replace(/\s*\|\s*/g, '<br>') : '';
      headlineEl.classList.remove('skeleton');
      headlineEl.style.minWidth = 'auto';
      headlineEl.style.height = 'auto';
      headlineEl.style.lineHeight = '1.4';

      document.title = `${currentUser.name} Contact Card`;

      // Header Notch Cover Image
      const notch = document.querySelector('.header-notch');
      if (currentUser.coverUrl) {
        notch.style.backgroundImage = `url(${currentUser.coverUrl})`;
      } else {
        notch.style.background = '#FFFFFF';
      }

      // Socials (Top Pills)
      const topSocials = document.getElementById('topSocialPills');
      topSocials.innerHTML = '';
      const s = currentUser.socials || {};

      if (s.linkedin) {
        const a = document.createElement('a');
        a.href = s.linkedin;
        a.className = 'pill';
        a.innerHTML = `<i class="fa-brands fa-linkedin-in"></i> LinkedIn`;
        topSocials.appendChild(a);
      }
      if (s.instagram) {
        const a = document.createElement('a');
        a.href = s.instagram;
        a.className = 'pill';
        a.innerHTML = `<i class="fa-brands fa-instagram"></i> Instagram`;
        topSocials.appendChild(a);
      }
      if (s.facebook) {
        const a = document.createElement('a');
        a.href = s.facebook;
        a.className = 'pill';
        a.innerHTML = `<i class="fa-brands fa-facebook"></i> Facebook`;
        topSocials.appendChild(a);
      }

      const shareBtn = document.createElement('button');
      shareBtn.className = 'pill';
      shareBtn.onclick = shareCard;
      shareBtn.innerHTML = `<i class="fa-solid fa-share-nodes"></i> Share`;
      topSocials.appendChild(shareBtn);

      renderBrands();
    }

    function renderBrands() {
      const tabs = document.getElementById('brandTabs');
      tabs.innerHTML = '';
      const brands = currentUser.brands || [];

      brands.forEach((brand, idx) => {
        const div = document.createElement('div');
        div.className = `brand-tab ${currentBrand && currentBrand.id === brand.id ? 'active' : (!currentBrand && idx === 0 ? 'active' : '')}`;

        if (brand.logo) {
          div.innerHTML = `<img src="${brand.logo}" alt="${brand.name}" class="brand-logo-img" />`;
        } else {
          div.innerHTML = `<div class="pill" style="color:white; background: transparent; border: 1px solid var(--border-color);">${brand.name.toUpperCase()}</div>`;
        }

        div.onclick = () => {
          currentBrand = brand;
          document.querySelectorAll('.brand-tab').forEach(t => t.classList.remove('active'));
          div.classList.add('active');
          updateActionBlock();
          renderContactList(brand);
        };
        tabs.appendChild(div);
      });

      if (currentBrand) {
        updateActionBlock();
        renderContactList(currentBrand);
      } else if (brands.length > 0) {
        currentBrand = brands[0];
        updateActionBlock();
        renderContactList(currentBrand);
      } else {
        // If no brands, maybe clear contact list or show personal contact if available
        renderContactList(null);
      }
    }

    function updateActionBlock() {
      const c = currentBrand ? currentBrand.contact : currentUser;
      if (!c) return;

      const phoneE164 = normalizeE164(c.phoneE164 || c.phone);
      const footer = document.getElementById('actionFooterContainer');
      footer.innerHTML = '';

      // Reset active icons
      document.querySelectorAll('.action-icon').forEach(icon => {
        icon.classList.remove('active');
        if (icon.getAttribute('title').toLowerCase() === currentAction) {
          icon.classList.add('active');
        }
      });

      if (currentAction === 'call') {
        footer.innerHTML += `
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="phone-display">${c.phone || 'N/A'}</div>
            <a href="${c.phone ? `tel:${phoneE164}` : '#'}" class="call-now-pill">Call <i class="fa-solid fa-arrow-right"></i></a>
          </div>
        `;
        if (c.secondaryPhone) {
          const secE164 = normalizeE164(c.secondaryPhoneE164 || c.secondaryPhone);
          footer.innerHTML += `
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div class="phone-display">${c.secondaryPhone}</div>
              <a href="tel:${secE164}" class="call-now-pill">Call <i class="fa-solid fa-arrow-right"></i></a>
            </div>
          `;
        }
      } else if (currentAction === 'whatsapp') {
        const waPhone = c.whatsappPhone || c.phone;
        const waE164 = normalizeE164(c.whatsappPhoneE164 || c.whatsappPhone || c.phoneE164 || c.phone);
        footer.innerHTML += `
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="phone-display">${waPhone || 'N/A'}</div>
            <a href="${waPhone ? `https://wa.me/${waE164.replace('+', '')}` : '#'}" class="call-now-pill">WhatsApp <i class="fa-brands fa-whatsapp"></i></a>
          </div>
        `;
      } else if (currentAction === 'email') {
        footer.innerHTML += `
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="phone-display" style="font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%;">${c.email || 'N/A'}</div>
            <a href="${c.email ? `mailto:${c.email}` : '#'}" class="call-now-pill">Send Email <i class="fa-solid fa-arrow-right"></i></a>
          </div>
        `;
      } else if (currentAction === 'save contact') {
        const div = document.createElement('div');
        div.style.cssText = "display: flex; justify-content: space-between; align-items: center;";
        div.innerHTML = `
          <div class="phone-display">Save to Contacts</div>
          <a href="#" class="call-now-pill">Download VCF <i class="fa-solid fa-arrow-right"></i></a>
        `;
        div.querySelector('a').onclick = (e) => {
          e.preventDefault();
          downloadVCF(currentUser, currentBrand);
        };
        footer.appendChild(div);
      }
    }

    function downloadVCF(user, brand) {
      const contact = brand ? brand.contact : user;
      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${user.name}${brand ? ' (' + brand.name + ')' : ''}
TEL;TYPE=CELL:${contact.phone}
EMAIL:${contact.email}
URL:${contact.website}
ADR:;;${contact.address};;;;
END:VCARD`;
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${user.name.replace(/\s+/g, '_')}${brand ? '_' + brand.id : ''}.vcf`;
      a.click();
    }

    // Attach action tab listeners
    document.querySelectorAll('.action-icon').forEach(icon => {
      icon.onclick = () => {
        currentAction = icon.getAttribute('title').toLowerCase();
        updateActionBlock();
      };
    });

    function toggleAccordion(el) {
      const isActive = el.classList.contains('active');
      // Close all others
      document.querySelectorAll('.contact-item').forEach(item => item.classList.remove('active'));
      // Toggle current
      if (!isActive) el.classList.add('active');
    }

    function renderContactList(brand) {
      const list = document.getElementById('contactList');
      const c = brand ? brand.contact : currentUser;
      if (!c) {
        list.innerHTML = '';
        return;
      }
      const phoneE164 = normalizeE164(c.phoneE164 || c.phone);

      list.innerHTML = `
          <!-- Contact Number -->
          <div class="contact-item active" onclick="toggleAccordion(this)">
            <div class="contact-header">
              <div class="contact-item-left">
                <div class="contact-item-icon">
                 <i class="fa-solid fa-square-phone"></i>
                </div>
                <div class="contact-item-content">
                  <span class="contact-label">Contact Number</span>
                </div>
              </div>
              <div class="chevron">
                <i class="fa-solid fa-chevron-right"></i>
              </div>
            </div>
            <div class="contact-body">
              <div class="accordion-content-row" style="margin-bottom: ${c.secondaryPhone ? '15px' : '0'};">
                <span class="contact-value">${c.phone || 'N/A'}</span>
                <div class="accordion-actions">
                   <a href="tel:${phoneE164}" class="call-now-pill">Call <i class="fa-solid fa-arrow-right"></i></a>
                </div>
              </div>
              ${c.secondaryPhone ? `
              <div class="accordion-content-row">
                <span class="contact-value">${c.secondaryPhone}</span>
                <div class="accordion-actions">
                   <a href="tel:${normalizeE164(c.secondaryPhoneE164 || c.secondaryPhone)}" class="call-now-pill">Call <i class="fa-solid fa-arrow-right"></i></a>
                </div>
              </div>
              ` : ''}
            </div>
          </div>

          <!-- WhatsApp Number -->
          <div class="contact-item" onclick="toggleAccordion(this)">
            <div class="contact-header">
              <div class="contact-item-left">
                <div class="contact-item-icon">
                 <i class="fa-brands fa-whatsapp"></i>
                </div>
                <div class="contact-item-content">
                  <span class="contact-label">WhatsApp Number</span>
                </div>
              </div>
              <div class="chevron">
                <i class="fa-solid fa-chevron-right"></i>
              </div>
            </div>
            <div class="contact-body">
              <div class="accordion-content-row">
                <span class="contact-value">${c.whatsappPhone || c.phone || 'N/A'}</span>
                <div class="accordion-actions">
                   <a href="https://wa.me/${normalizeE164(c.whatsappPhoneE164 || c.whatsappPhone || c.phoneE164 || c.phone).replace('+', '')}" class="call-now-pill">Message <i class="fa-solid fa-arrow-right"></i></a>
                </div>
              </div>
            </div>
          </div>

          <!-- Website -->
          <div class="contact-item" onclick="toggleAccordion(this)">
            <div class="contact-header">
              <div class="contact-item-left">
                <div class="contact-item-icon">
                  <i class="fa-solid fa-globe"></i>
                </div>
                <div class="contact-item-content">
                  <span class="contact-label">Website</span>
                </div>
              </div>
              <div class="chevron">
                <i class="fa-solid fa-chevron-right"></i>
              </div>
            </div>
            <div class="contact-body">
              <div class="accordion-content-row">
                <span class="contact-value">${c.website ? c.website.replace(/^https?:\/\//, '') : 'N/A'}</span>
                <div class="accordion-actions">
                   <a href="${c.website}" target="_blank" class="call-now-pill">Visit <i class="fa-solid fa-arrow-right"></i></a>
                </div>
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="contact-item" onclick="toggleAccordion(this)">
            <div class="contact-header">
              <div class="contact-item-left">
                <div class="contact-item-icon">
                  <i class="fa-regular fa-envelope"></i>
                </div>
                <div class="contact-item-content">
                  <span class="contact-label">E-mail</span>
                </div>
              </div>
              <div class="chevron">
                <i class="fa-solid fa-chevron-right"></i>
              </div>
            </div>
            <div class="contact-body">
              <div class="accordion-content-row">
                <span class="contact-value">${c.email || 'N/A'}</span>
                <div class="accordion-actions">
                   <a href="mailto:${c.email}" class="call-now-pill">Email <i class="fa-solid fa-arrow-right"></i></a>
                </div>
              </div>
            </div>
          </div>

          <!-- Address -->
          <div class="contact-item" onclick="toggleAccordion(this)">
            <div class="contact-header">
              <div class="contact-item-left">
                <div class="contact-item-icon">
                  <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="contact-item-content">
                  <span class="contact-label">Address</span>
                </div>
              </div>
              <div class="chevron">
                <i class="fa-solid fa-chevron-right"></i>
              </div>
            </div>
            <div class="contact-body">
              <div class="accordion-content-row">
                <span class="contact-value">${c.address || 'N/A'}</span>
                <div class="accordion-actions">
                   <a href="https://maps.google.com/?q=${encodeURIComponent(c.address)}" target="_blank" class="call-now-pill">Maps <i class="fa-solid fa-arrow-right"></i></a>
                </div>
              </div>
            </div>
          </div>

          <!-- Bottom Social Pills -->
          <div class="social-pills" style="margin-top: 20px; padding: 0; gap: 8px;">
            ${(brand?.socials || currentUser.socials)?.instagram ? `<a href="${(brand?.socials || currentUser.socials).instagram}" target="_blank" class="pill"><i class="fa-brands fa-instagram"></i> Instagram</a>` : ''}
            ${(brand?.socials || currentUser.socials)?.facebook ? `<a href="${(brand?.socials || currentUser.socials).facebook}" target="_blank" class="pill"><i class="fa-brands fa-facebook"></i> Facebook</a>` : ''}
            ${(brand?.socials || currentUser.socials)?.linkedin ? `<a href="${(brand?.socials || currentUser.socials).linkedin}" target="_blank" class="pill"><i class="fa-brands fa-linkedin-in"></i> LinkedIn</a>` : ''}
            ${(brand?.socials || currentUser.socials)?.youtube ? `<a href="${(brand?.socials || currentUser.socials).youtube}" target="_blank" class="pill"><i class="fa-brands fa-youtube"></i> YouTube</a>` : ''}
          </div>
        `;
    }

    async function shareCard() {
      const shareData = {
        title: currentUser?.name || 'Contact',
        url: window.location.href,
      };
      if (navigator.share) {
        try { await navigator.share(shareData); } catch (_) { }
        return;
      }
      try {
        await navigator.clipboard.writeText(window.location.href);
        alert('Link copied!');
      } catch (e) { }
    }

    function openGalleryPage() {
      const username = getUsernameFromUrl();
      if (username) {
        window.location.href = `./pages/gallery.html?username=${username}`;
      } else {
        window.location.href = './pages/gallery.html';
      }
    }

    function openAboutPage() {
      const username = getUsernameFromUrl();
      if (username) {
        window.location.href = `./pages/about.html?username=${username}`;
      } else {
        window.location.href = './pages/about.html';
      }
    }

    init();
  </script>

</body>

</html>
